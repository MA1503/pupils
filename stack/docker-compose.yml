# Pupils — Produktions-Stack für Portainer
# Deployment: In Portainer als Stack anlegen, Env-Vars direkt im Portainer-UI setzen
# Build-Kontext: Repo-Root (damit ./app/ beim pupils-app-Build verfügbar ist)

services:

  couchdb:
    image: couchdb:3.3.3
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      COUCHDB_USER: ${COUCHDB_ADMIN_USER}
      COUCHDB_PASSWORD: ${COUCHDB_ADMIN_PASSWORD}
      TEACHER_PASSWORD: ${TEACHER_PASSWORD}
      COUCHDB_CORS_ORIGIN: ${COUCHDB_CORS_ORIGIN:-}
    volumes:
      - /mnt/usb/pupils/couchdb-data:/opt/couchdb/data
      - /mnt/usb/pupils/couchdb-config:/opt/couchdb/etc/local.d
    ports:
      - "127.0.0.1:5984:5984"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5984/_up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  couchdb-setup:
    image: couchdb:3.3.3
    depends_on:
      couchdb:
        condition: service_healthy
    environment:
      COUCHDB_HOST: http://couchdb:5984
      COUCHDB_USER: ${COUCHDB_ADMIN_USER}
      COUCHDB_PASSWORD: ${COUCHDB_ADMIN_PASSWORD}
      TEACHER_PASSWORD: ${TEACHER_PASSWORD}
      COUCHDB_CORS_ORIGIN: ${COUCHDB_CORS_ORIGIN:-}
    volumes:
      - ./couchdb/init:/init:ro
    entrypoint: ["/bin/bash", "/init/00-setup.sh"]
    restart: "no"

  pupils-app:
    build:
      context: ..
      dockerfile: stack/pupils-app/Dockerfile
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:8099:80"
    depends_on:
      couchdb:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'

  backup:
    build: ./backup
    restart: unless-stopped
    user: "1000:1000"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      COUCHDB_URL: http://couchdb:5984
      COUCHDB_USER: ${COUCHDB_ADMIN_USER}
      COUCHDB_PASSWORD: ${COUCHDB_ADMIN_PASSWORD}
      FILEN_EMAIL: ${FILEN_EMAIL}
      FILEN_PASSWORD: ${FILEN_PASSWORD}
      FILEN_REMOTE_DIR: /pupils-backups
      BACKUP_RETENTION_DAYS: "30"
    volumes:
      - /mnt/usb/pupils/backups:/backups
    depends_on:
      couchdb:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
