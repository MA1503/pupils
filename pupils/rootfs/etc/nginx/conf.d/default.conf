server {
    listen 8099;
    server_name _;

    root /var/www/pupils;
    index index.html;

    # Strip ingress path prefix if present (HAOS Ingress)
    # HAOS sends: /api/hassio_ingress/HASH/path → we serve /path
    location ~ ^/api/hassio_ingress/[a-f0-9]+(/.*)?$ {
        rewrite ^/api/hassio_ingress/[a-f0-9]+(.*)$ $1 last;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /couchdb/ {
        proxy_pass         http://127.0.0.1:5984/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}