name: "Yasmins Vocal Lab"
version: "1.0.14"
slug: "pupils"
description: "Schüler-Verwaltung für Gesangslehrerin"
url: "https://github.com/ma1503/pupils"
changelog: "https://raw.githubusercontent.com/MA1503/pupils/main/CHANGELOG.md"
arch:
  - aarch64
  - amd64
init: false
image: "ghcr.io/ma1503/pupils-haos-addon"
ports:
  8099/tcp: 8099
webui: "http://[HOST]:[PORT:8099]"
panel_icon: "mdi:microphone"
panel_title: "Vocal Lab"
startup: "application"
map:
  - data:rw
environment:
  COUCHDB_USER: admin
  COUCHDB_PASSWORD: "{{couchdb_password}}"
  FILEN_EMAIL: "{{filen_email}}"
  FILEN_PASSWORD: "{{filen_password}}"
  COUCHDB_URL: "http://127.0.0.1:5984"
  FILEN_REMOTE_DIR: "/pupils-backups"
  BACKUP_RETENTION_DAYS: "30"
options:
  teacher_password: "changeme"
  couchdb_password: "changeme"
  filen_email: ""
  filen_password: ""
schema:
  teacher_password: "password"
  couchdb_password: "password"
  filen_email: "str"
  filen_password: "password"
